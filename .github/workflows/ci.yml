name: validate

on:
  push:
  pull_request:

jobs:
  python-syntax:
    name: Python syntax (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile scripts
        shell: bash
        run: |
          python - <<'PY'
          import py_compile
          from pathlib import Path

          for path in sorted(Path("scripts").glob("*.py")):
              py_compile.compile(str(path), doraise=True)
          PY

      - name: Smoke-test text linter
        shell: bash
        run: |
          cat > /tmp/atscv-clean.md <<'EOF'
          - Built ATS validation scripts with Python, Playwright, Poppler, and measurable layout checks
          - Reduced resume QA guesswork by rendering PDFs, extracting text, and measuring page coverage
          EOF
          python scripts/lint_cv_text.py /tmp/atscv-clean.md

      - name: Smoke-test templates and keyword tools
        shell: bash
        run: |
          python scripts/render_resume_template.py --template technical-sde.html --data examples/resume-data.json --out /tmp/atscv-template.html
          python scripts/audit_ats_structure.py /tmp/atscv-template.html
          python scripts/audit_resume_content.py /tmp/atscv-template.html
          python scripts/check_grammar.py /tmp/atscv-template.html --provider offline
          python scripts/extract_job_keywords.py examples/job-description.txt --resume /tmp/atscv-template.html --limit 10
          python scripts/update_resume_data.py examples/resume-data.json --out /tmp/atscv-data.json --add-skill "Cloud=Azure"
