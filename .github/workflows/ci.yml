name: validate

on:
  push:
  pull_request:

jobs:
  python-syntax:
    name: Python syntax (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile scripts
        run: python -m py_compile scripts/*.py

      - name: Smoke-test text linter
        shell: bash
        run: |
          cat > /tmp/atscv-clean.md <<'EOF'
          - Built ATS validation scripts with Python, Playwright, Poppler, and measurable layout checks
          - Reduced resume QA guesswork by rendering PDFs, extracting text, and measuring page coverage
          EOF
          python scripts/lint_cv_text.py /tmp/atscv-clean.md
