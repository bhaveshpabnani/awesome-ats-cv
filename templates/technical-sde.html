<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{NAME}} - Technical Resume</title>
  <style>
    @page { size: A4; margin: 10mm 11mm; }
    * { box-sizing: border-box; }
    body { margin: 0; color: #111827; font-family: Arial, Helvetica, sans-serif; font-size: 10.6pt; line-height: 1.23; }
    .page { max-width: 190mm; margin: 0 auto; }
    h1 { margin: 0; font-size: 22pt; line-height: 1.02; text-align: center; letter-spacing: 0; }
    .headline, .contact { text-align: center; margin: 2px 0; }
    .headline { font-weight: 700; }
    .contact, .contact a { color: #1f2937; text-decoration: none; }
    section { margin-top: 6px; }
    h2 { margin: 0 0 3px; padding-bottom: 1px; border-bottom: 0.8px solid #111827; font-size: 10pt; text-transform: uppercase; letter-spacing: 0; }
    p { margin: 2px 0; }
    .entry { margin-top: 3px; }
    .entry-head { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
    .entry-head strong { font-size: 9.8pt; }
    .entry-head span { white-space: nowrap; color: #374151; }
    .keywords { color: #374151; font-size: 10pt; }
    ul { margin: 2px 0 0 16px; padding: 0; }
    li { margin: 1px 0; padding-left: 1px; }
    strong { font-size: 9.8pt; font-weight: 700; }
  </style>
</head>
<body>
  <main class="page">
    <h1>{{NAME}}</h1>
    <p class="headline">{{HEADLINE}}</p>
    <p class="contact">{{CONTACT}}</p>
    <section><h2>Summary</h2><p>{{SUMMARY}}</p></section>
    <section><h2>Technical Skills</h2>{{SKILLS}}</section>
    {{EXPERIENCE}}
    {{PROJECTS}}
    {{EDUCATION}}
    {{ACHIEVEMENTS}}
  </main>
</body>
</html>
